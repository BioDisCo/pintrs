repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --check
        language: system
        always_run: true
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy -- -D warnings
        language: system
        always_run: true
        pass_filenames: false

      - id: cargo-test
        name: cargo test
        entry: cargo test
        language: system
        always_run: true
        pass_filenames: false

      - id: ruff-check
        name: ruff check
        entry: ruff check python/ tests/
        language: system
        always_run: true
        pass_filenames: false

      - id: ruff-format
        name: ruff format
        entry: ruff format --check python/ tests/
        language: system
        always_run: true
        pass_filenames: false

      - id: mypy
        name: mypy
        entry: mypy python/pintrs/
        language: system
        always_run: true
        pass_filenames: false

      - id: pyright
        name: pyright
        entry: pyright python/pintrs/
        language: system
        always_run: true
        pass_filenames: false

      - id: pytest
        name: pytest
        entry: pytest tests/ -x -q
        language: system
        always_run: true
        pass_filenames: false
