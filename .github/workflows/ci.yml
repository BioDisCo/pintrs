name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create virtualenv
        run: python -m venv .venv

      - name: Activate virtualenv
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            echo "$GITHUB_WORKSPACE/.venv/Scripts" >> "$GITHUB_PATH"
          else
            echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"
          fi
          echo "VIRTUAL_ENV=$GITHUB_WORKSPACE/.venv" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pip install maturin pytest numpy

      - name: Build extension
        run: maturin develop --release

      - name: Run tests
        run: pytest

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Create virtualenv
        run: python -m venv .venv

      - name: Activate virtualenv
        run: |
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"
          echo "VIRTUAL_ENV=$GITHUB_WORKSPACE/.venv" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pip install maturin ruff mypy numpy

      - name: Build extension
        run: maturin develop --release

      - name: Ruff check
        run: ruff check python/ tests/

      - name: Ruff format check
        run: ruff format --check python/ tests/

      - name: Mypy
        run: mypy python/pintrs/

  rust:
    name: Rust checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cargo fmt
        run: cargo fmt --check

      - name: Cargo clippy
        run: cargo clippy -- -D warnings

      - name: Cargo test
        run: cargo test
